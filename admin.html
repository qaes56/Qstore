<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة تحكم Qstore</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600;700;800&family=Tajawal:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0F1B1C; --surface:#15262A; --surface-2:#1C3137;
    --paper:#F4EEDD; --gold:#D8A857; --teal:#4FAE9B; --peri:#6C8FD1;
    --muted:#8AA0A0; --line:rgba(244,238,221,0.12); --danger:#D8694F; --radius:16px;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--ink);color:var(--paper);font-family:'Tajawal',sans-serif;line-height:1.6;min-height:100vh;}
  h1,h2,h3{font-family:'Cairo',sans-serif;}
  .mono{font-family:'JetBrains Mono',monospace;}
  input,select,textarea,button{font-family:'Tajawal',sans-serif;}
  .wrap{max-width:860px;margin:0 auto;padding:24px 18px 60px;}

  /* ---- login ---- */
  #loginScreen{
    min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;
  }
  .login-box{
    width:100%;max-width:360px;background:var(--surface);border:1px solid var(--line);
    border-radius:var(--radius);padding:34px 28px;text-align:center;
  }
  .login-box h1{font-size:22px;margin-bottom:6px;}
  .login-box p{color:var(--muted);font-size:13.5px;margin-bottom:24px;}
  .field{margin-bottom:14px;text-align:right;}
  .field label{display:block;font-size:13px;color:var(--muted);margin-bottom:6px;}
  input,select,textarea{
    width:100%;background:var(--surface-2);border:1px solid var(--line);color:var(--paper);
    padding:11px 14px;border-radius:10px;font-size:14.5px;outline:none;
  }
  input:focus,select:focus,textarea:focus{border-color:var(--gold);}
  textarea{resize:vertical;min-height:70px;}
  button{
    cursor:pointer;border:none;border-radius:10px;font-weight:700;font-size:14.5px;
    padding:12px 18px;transition:transform .15s ease, opacity .15s ease;
  }
  button:hover{transform:translateY(-1px);}
  .btn-gold{background:var(--gold);color:#1A1407;width:100%;}
  .btn-teal{background:var(--teal);color:#0B1718;}
  .btn-ghost{background:transparent;border:1px solid var(--line);color:var(--paper);}
  .btn-danger{background:var(--danger);color:#1A0E09;}
  .login-error{color:var(--danger);font-size:13px;margin-top:10px;min-height:18px;}

  /* ---- dashboard ---- */
  #dashScreen{display:none;}
  header.topbar{
    display:flex;align-items:center;justify-content:space-between;
    border-bottom:1px solid var(--line);padding:18px;position:sticky;top:0;background:var(--ink);z-index:10;
  }
  header.topbar h1{font-size:18px;}
  header.topbar .who{font-size:12.5px;color:var(--muted);}

  .panel{
    background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
    padding:24px;margin-bottom:26px;
  }
  .panel h2{font-size:17px;margin-bottom:18px;display:flex;align-items:center;gap:8px;}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  @media (max-width:560px){.grid2{grid-template-columns:1fr;}}

  .img-row{display:flex;align-items:center;gap:14px;margin-bottom:14px;}
  .img-preview{
    width:64px;height:64px;border-radius:10px;background:var(--surface-2);
    display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0;
    color:var(--muted);font-size:11px;text-align:center;border:1px dashed var(--line);
  }
  .img-preview img{width:100%;height:100%;object-fit:cover;}
  .file-btn{
    display:inline-block;background:var(--surface-2);border:1px solid var(--line);
    padding:10px 16px;border-radius:10px;font-size:13.5px;cursor:pointer;
  }
  .file-btn input{display:none;}
  .checkbox-row{display:flex;align-items:center;gap:8px;font-size:13.5px;color:var(--muted);margin:10px 0;}
  .checkbox-row input{width:auto;}
  .form-actions{display:flex;gap:10px;margin-top:16px;}
  .hint{font-size:12px;color:var(--muted);margin-top:4px;}

  /* product list */
  .prod-item{
    display:flex;align-items:center;gap:14px;padding:14px 0;border-bottom:1px solid var(--line);
  }
  .prod-item:last-child{border-bottom:none;}
  .prod-thumb{
    width:54px;height:54px;border-radius:10px;background:var(--surface-2);flex-shrink:0;
    display:flex;align-items:center;justify-content:center;overflow:hidden;color:var(--gold);font-size:20px;font-weight:800;
  }
  .prod-thumb img{width:100%;height:100%;object-fit:cover;}
  .prod-info{flex:1;min-width:0;}
  .prod-info .nm{font-weight:700;font-size:14.5px;}
  .prod-info .meta{font-size:12.5px;color:var(--muted);margin-top:2px;}
  .prod-actions{display:flex;gap:8px;flex-shrink:0;}
  .icon-btn{
    width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;
    background:var(--surface-2);border:1px solid var(--line);cursor:pointer;color:var(--paper);font-size:14px;
  }
  .icon-btn:hover{border-color:var(--gold);}
  .empty-state{color:var(--muted);text-align:center;padding:30px 0;font-size:14px;}
  .toast{
    position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);
    background:var(--teal);color:#0B1718;padding:13px 22px;border-radius:10px;font-weight:700;font-size:14px;
    opacity:0;transition:all .3s ease;z-index:100;pointer-events:none;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  .toast.error{background:var(--danger);color:#1A0E09;}
  .inactive{opacity:.5;}
  .badge-off{font-size:11px;background:var(--surface-2);color:var(--muted);padding:2px 8px;border-radius:999px;margin-right:6px;}
</style>
</head>
<body>

<!-- ===== شاشة تسجيل الدخول ===== -->
<div id="loginScreen">
  <div class="login-box">
    <h1>لوحة تحكم Qstore</h1>
    <p>سجّل دخولك لإدارة المنتجات والأسعار</p>
    <div class="field">
      <label>البريد الإلكتروني</label>
      <input type="email" id="loginEmail" placeholder="admin@example.com">
    </div>
    <div class="field">
      <label>كلمة المرور</label>
      <input type="password" id="loginPass" placeholder="••••••••">
    </div>
    <button class="btn-gold" id="loginBtn" style="width:100%;">دخول</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<!-- ===== لوحة التحكم ===== -->
<div id="dashScreen">
  <header class="topbar">
    <h1>لوحة تحكم Qstore</h1>
    <div style="display:flex;align-items:center;gap:12px;">
      <span class="who" id="whoEmail"></span>
      <button class="btn-ghost" id="logoutBtn">خروج</button>
    </div>
  </header>

  <div class="wrap">
    <div class="panel">
      <h2 id="formTitle">➕ إضافة منتج جديد</h2>

      <div class="img-row">
        <div class="img-preview" id="imgPreview">بدون صورة</div>
        <label class="file-btn">
          اختر صورة المنتج
          <input type="file" id="imgInput" accept="image/*">
        </label>
        <button class="btn-ghost" id="removeImgBtn" type="button" style="display:none;">إزالة الصورة</button>
      </div>
      <div class="hint">يفضّل صورة مربعة، يتم تصغيرها تلقائياً قبل الحفظ.</div>

      <div class="grid2" style="margin-top:16px;">
        <div class="field">
          <label>اسم المنتج</label>
          <input type="text" id="fName" placeholder="مثال: Adobe Creative Cloud">
        </div>
        <div class="field">
          <label>التصنيف</label>
          <select id="fCat">
            <option value="design">تصميم وإبداع</option>
            <option value="ai">ذكاء اصطناعي</option>
            <option value="productivity">إنتاجية</option>
            <option value="3d">3D وبرمجة</option>
            <option value="entertainment">ترفيه</option>
            <option value="social">تواصل اجتماعي</option>
          </select>
        </div>
        <div class="field">
          <label>السعر (دينار عراقي) — اتركه فاضي لعرض "تواصل للسعر"</label>
          <input type="number" id="fPrice" placeholder="مثال: 75000">
        </div>
        <div class="field">
          <label>المدة</label>
          <input type="text" id="fDuration" placeholder="مثال: 4 أشهر / سنوي / مدى الحياة">
        </div>
      </div>

      <div class="field" style="margin-top:4px;">
        <label>وصف قصير (يظهر بالبطاقة)</label>
        <input type="text" id="fDesc" placeholder="جملة واحدة قصيرة عن المنتج">
      </div>
      <div class="field">
        <label>وصف تفصيلي (يظهر بنافذة التفاصيل)</label>
        <textarea id="fLong" placeholder="شرح أوضح عن المنتج وكيف يفيد العميل"></textarea>
      </div>
      <div class="field">
        <label>المميزات (سطر واحد لكل ميزة)</label>
        <textarea id="fFeatures" placeholder="مثال:&#10;يشمل Photoshop وIllustrator&#10;تفعيل على بريدك الخاص&#10;دعم فني مباشر"></textarea>
      </div>

      <div class="checkbox-row">
        <input type="checkbox" id="fActive" checked>
        <label for="fActive">إظهار هذا المنتج في الموقع</label>
      </div>

      <div class="form-actions">
        <button class="btn-gold" id="saveBtn" style="flex:1;">حفظ المنتج</button>
        <button class="btn-ghost" id="cancelEditBtn" style="display:none;">إلغاء التعديل</button>
      </div>
    </div>

    <div class="panel">
      <h2>📦 المنتجات الحالية</h2>
      <div id="prodList"><div class="empty-state">جاري التحميل...</div></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import {
    getFirestore, collection, addDoc, updateDoc, deleteDoc, doc, onSnapshot, query, orderBy
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
  import {
    getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

  // ===== إعدادات Firebase الخاصة بمتجرك =====
  const firebaseConfig = {
    apiKey: "AIzaSyC_MLXtjOPOxOTGKlYEOzxRiPSoNT5p1Kc",
    authDomain: "qstore-d2fb4.firebaseapp.com",
    projectId: "qstore-d2fb4",
    storageBucket: "qstore-d2fb4.firebasestorage.app",
    messagingSenderId: "269555067998",
    appId: "1:269555067998:web:2fe1d81ab8aa6170ee98cf",
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const auth = getAuth(app);

  const CAT_LABELS = {design:"تصميم وإبداع", ai:"ذكاء اصطناعي", productivity:"إنتاجية", "3d":"3D وبرمجة", entertainment:"ترفيه", social:"تواصل اجتماعي"};

  // ===== عناصر الصفحة =====
  const loginScreen = document.getElementById('loginScreen');
  const dashScreen = document.getElementById('dashScreen');
  const loginBtn = document.getElementById('loginBtn');
  const loginError = document.getElementById('loginError');
  const logoutBtn = document.getElementById('logoutBtn');
  const whoEmail = document.getElementById('whoEmail');

  function showToast(msg, isError){
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast show' + (isError ? ' error' : '');
    setTimeout(() => { t.className = 'toast'; }, 2600);
  }

  // ===== تسجيل الدخول =====
  loginBtn.addEventListener('click', async () => {
    const email = document.getElementById('loginEmail').value.trim();
    const pass = document.getElementById('loginPass').value;
    loginError.textContent = "";
    if(!email || !pass){ loginError.textContent = "أدخل البريد وكلمة المرور."; return; }
    try{
      await signInWithEmailAndPassword(auth, email, pass);
    }catch(err){
      // رسائل خطأ واضحة
      if(err.code === 'auth/user-not-found' || err.code === 'auth/invalid-credential' || err.code === 'auth/wrong-password'){
        loginError.textContent = "البريد الإلكتروني أو كلمة المرور غير صحيحة.";
      } else if(err.code === 'auth/too-many-requests'){
        loginError.textContent = "تم تعطيل الحساب مؤقتاً بسبب محاولات كثيرة. انتظر قليلاً.";
      } else if(err.code === 'auth/network-request-failed'){
        loginError.textContent = "تحقق من اتصالك بالإنترنت.";
      } else {
        loginError.textContent = "خطأ: " + err.code;
      }
    }
  });
  document.getElementById('loginPass').addEventListener('keydown', e => { if(e.key === 'Enter') loginBtn.click(); });

  logoutBtn.addEventListener('click', () => signOut(auth));

  onAuthStateChanged(auth, (user) => {
    if(user){
      loginScreen.style.display = 'none';
      dashScreen.style.display = 'block';
      whoEmail.textContent = user.email;
      startProductsListener();
    } else {
      dashScreen.style.display = 'none';
      loginScreen.style.display = 'flex';
    }
  });

  // ===== ضغط الصورة قبل الحفظ =====
  let pendingImage = null; // base64 data URL أو null
  const imgInput = document.getElementById('imgInput');
  const imgPreview = document.getElementById('imgPreview');
  const removeImgBtn = document.getElementById('removeImgBtn');

  function resizeImage(file, maxSize = 640, quality = 0.72){
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = (e) => {
        const img = new Image();
        img.onload = () => {
          let { width, height } = img;
          if(width > height){
            if(width > maxSize){ height = Math.round(height * maxSize / width); width = maxSize; }
          } else {
            if(height > maxSize){ width = Math.round(width * maxSize / height); height = maxSize; }
          }
          const canvas = document.createElement('canvas');
          canvas.width = width; canvas.height = height;
          canvas.getContext('2d').drawImage(img, 0, 0, width, height);
          resolve(canvas.toDataURL('image/jpeg', quality));
        };
        img.onerror = reject;
        img.src = e.target.result;
      };
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  imgInput.addEventListener('change', async () => {
    const file = imgInput.files[0];
    if(!file) return;
    try{
      pendingImage = await resizeImage(file);
      imgPreview.innerHTML = `<img src="${pendingImage}">`;
      removeImgBtn.style.display = 'inline-block';
    }catch(err){
      showToast("تعذّر تحميل الصورة", true);
    }
  });
  removeImgBtn.addEventListener('click', () => {
    pendingImage = null;
    imgInput.value = '';
    imgPreview.innerHTML = 'بدون صورة';
    removeImgBtn.style.display = 'none';
  });

  // ===== حفظ / تعديل منتج =====
  let editingId = null;
  const formTitle = document.getElementById('formTitle');
  const cancelEditBtn = document.getElementById('cancelEditBtn');

  function resetForm(){
    editingId = null;
    document.getElementById('fName').value = '';
    document.getElementById('fCat').value = 'design';
    document.getElementById('fPrice').value = '';
    document.getElementById('fDuration').value = '';
    document.getElementById('fDesc').value = '';
    document.getElementById('fLong').value = '';
    document.getElementById('fFeatures').value = '';
    document.getElementById('fActive').checked = true;
    pendingImage = null;
    imgInput.value = '';
    imgPreview.innerHTML = 'بدون صورة';
    removeImgBtn.style.display = 'none';
    formTitle.textContent = '➕ إضافة منتج جديد';
    cancelEditBtn.style.display = 'none';
  }
  cancelEditBtn.addEventListener('click', resetForm);

  document.getElementById('saveBtn').addEventListener('click', async () => {
    const name = document.getElementById('fName').value.trim();
    if(!name){ showToast('اكتب اسم المنتج أولاً', true); return; }
    const priceVal = document.getElementById('fPrice').value;
    const data = {
      name,
      cat: document.getElementById('fCat').value,
      price: priceVal === '' ? null : Number(priceVal),
      duration: document.getElementById('fDuration').value.trim(),
      desc: document.getElementById('fDesc').value.trim(),
      long: document.getElementById('fLong').value.trim(),
      features: document.getElementById('fFeatures').value.split('\n').map(s => s.trim()).filter(Boolean),
      active: document.getElementById('fActive').checked,
      image: pendingImage !== null ? pendingImage : (editingId ? undefined : null),
    };
    // إذا كنا نعدّل ولم تُغيّر الصورة، لا نلمس الحقل (يبقى كما هو)
    if(data.image === undefined) delete data.image;

    try{
      if(editingId){
        await updateDoc(doc(db, 'products', editingId), data);
        showToast('تم حفظ التعديلات');
      } else {
        data.createdAt = Date.now();
        await addDoc(collection(db, 'products'), data);
        showToast('تمت إضافة المنتج');
      }
      resetForm();
    }catch(err){
      showToast('حدث خطأ: ' + err.message, true);
    }
  });

  // ===== عرض/تعديل/حذف قائمة المنتجات =====
  const prodList = document.getElementById('prodList');
  let allProducts = [];

  function startProductsListener(){
    const q = query(collection(db, 'products'), orderBy('createdAt', 'asc'));
    onSnapshot(q, (snap) => {
      allProducts = [];
      snap.forEach(d => allProducts.push({ id: d.id, ...d.data() }));
      renderList();
    }, (err) => {
      prodList.innerHTML = `<div class="empty-state">تعذّر تحميل المنتجات: ${err.message}</div>`;
    });
  }

  function renderList(){
    if(allProducts.length === 0){
      prodList.innerHTML = '<div class="empty-state">لا توجد منتجات بعد، أضف أول منتج من الأعلى.</div>';
      return;
    }
    prodList.innerHTML = '';
    allProducts.forEach(p => {
      const row = document.createElement('div');
      row.className = 'prod-item' + (p.active === false ? ' inactive' : '');
      const priceLabel = (p.price === null || p.price === undefined) ? 'تواصل للسعر' : Number(p.price).toLocaleString('en-US') + ' د.ع';
      row.innerHTML = `
        <div class="prod-thumb">${p.image ? `<img src="${p.image}">` : (p.name ? p.name.trim().charAt(0) : '?')}</div>
        <div class="prod-info">
          <div class="nm">${p.active === false ? '<span class="badge-off">مخفي</span>' : ''}${p.name || ''}</div>
          <div class="meta">${CAT_LABELS[p.cat] || p.cat || ''} · ${priceLabel}${p.duration ? ' / ' + p.duration : ''}</div>
        </div>
        <div class="prod-actions">
          <div class="icon-btn" data-edit="${p.id}" title="تعديل">✏️</div>
          <div class="icon-btn" data-del="${p.id}" title="حذف">🗑️</div>
        </div>`;
      prodList.appendChild(row);
    });

    prodList.querySelectorAll('[data-edit]').forEach(btn => {
      btn.addEventListener('click', () => loadIntoForm(btn.dataset.edit));
    });
    prodList.querySelectorAll('[data-del]').forEach(btn => {
      btn.addEventListener('click', () => deleteProduct(btn.dataset.del));
    });
  }

  function loadIntoForm(id){
    const p = allProducts.find(x => x.id === id);
    if(!p) return;
    editingId = id;
    document.getElementById('fName').value = p.name || '';
    document.getElementById('fCat').value = p.cat || 'design';
    document.getElementById('fPrice').value = (p.price === null || p.price === undefined) ? '' : p.price;
    document.getElementById('fDuration').value = p.duration || '';
    document.getElementById('fDesc').value = p.desc || '';
    document.getElementById('fLong').value = p.long || '';
    document.getElementById('fFeatures').value = (p.features || []).join('\n');
    document.getElementById('fActive').checked = p.active !== false;
    pendingImage = null; // لا نغيّر الصورة إلا إذا رفع المستخدم صورة جديدة
    imgInput.value = '';
    imgPreview.innerHTML = p.image ? `<img src="${p.image}">` : 'بدون صورة';
    removeImgBtn.style.display = p.image ? 'inline-block' : 'none';
    formTitle.textContent = '✏️ تعديل: ' + (p.name || '');
    cancelEditBtn.style.display = 'inline-block';
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  async function deleteProduct(id){
    const p = allProducts.find(x => x.id === id);
    if(!confirm(`حذف "${p ? p.name : ''}" نهائياً؟`)) return;
    try{
      await deleteDoc(doc(db, 'products', id));
      showToast('تم الحذف');
      if(editingId === id) resetForm();
    }catch(err){
      showToast('تعذّر الحذف: ' + err.message, true);
    }
  }
</script>
</body>
</html>
