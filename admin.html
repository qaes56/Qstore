<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم - Qstore</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background-color: #f4f4f9; text-align: center; color: #000; }
        .form-container { max-width: 400px; margin: 0 auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0px 0px 10px rgba(0,0,0,0.1); }
        input, button { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { background-color: #ff9900; color: white; border: none; font-size: 16px; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #e68a00; }
        #adminContainer { display: none; } /* إخفاء لوحة التحكم لحين تسجيل الدخول */
    </style>
</head>
<body>

    <div class="form-container" id="loginContainer">
        <h2>تسجيل الدخول للوحة التحكم</h2>
        <input type="text" id="username" placeholder="اسم المستخدم" required>
        <input type="password" id="password" placeholder="كلمة المرور" required>
        <button id="loginBtn">دخول</button>
    </div>

    <div class="form-container" id="adminContainer">
        <h2>إضافة منتج جديد لـ Qstore</h2>
        <input type="text" id="prodName" placeholder="اسم المنتج (مثال: اشتراك نتفليكس شهر)" required>
        <input type="text" id="prodPrice" placeholder="السعر (مثال: 5,000 د.ع)" required>
        <input type="text" id="prodImage" placeholder="رابط صورة المنتج المعرفة" required>
        <button id="addBtn">نشر المنتج في الموقع</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        // إعدادات Firebase الخاصة بك
        const firebaseConfig = {
            apiKey: "AIzaSyC_MLXtjOPOxOTGKLYE0zxRiPSoNT5p1Kc",
            authDomain: "qstore-d2fb4.firebaseapp.com",
            projectId: "qstore-d2fb4",
            storageBucket: "qstore-d2fb4.firebasestorage.app",
            messagingSenderId: "269555067998",
            appId: "1:269555067998:web:2fe1d81ab8aa6170ee98cf",
            measurementId: "G-VS61EHPQX7"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // حساب الدخول الخاص بك (تگدر تغيرهم منا بكيفك)
        const myUsername = "Qstore";
        const myPassword = "Qwew1234@@@"; 

        // تفعيل زر تسجيل الدخول
        document.getElementById('loginBtn').addEventListener('click', () => {
            const userInp = document.getElementById('username').value;
            const passInp = document.getElementById('password').value;

            if(userInp === myUsername && passInp === myPassword) {
                document.getElementById('loginContainer').style.display = 'none';
                document.getElementById('adminContainer').style.display = 'block';
            } else {
                alert("اسم المستخدم أو كلمة المرور غير صحيحة!");
            }
        });

        // تفعيل زر نشر المنتج
        document.getElementById('addBtn').addEventListener('click', async () => {
            const name = document.getElementById('prodName').value;
            const price = document.getElementById('prodPrice').value;
            const image = document.getElementById('prodImage').value;

            if(name && price && image) {
                try {
                    await addDoc(collection(db, "products"), {
                        name: name,
                        price: price,
                        image: image,
                        createdAt: new Date()
                    });
                    alert("تم إضافة المنتج بنجاح لمتجرك!");
                    document.getElementById('prodName').value = '';
                    document.getElementById('prodPrice').value = '';
                    document.getElementById('prodImage').value = '';
                } catch (error) {
                    alert("حدث خطأ أثناء الإضافة: " + error.message);
                }
            } else {
                alert("الرجاء ملء جميع الحقول!");
            }
        });
    </script>
</body>
</html>
